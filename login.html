<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - GoBus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <div id="header-container"></div>

  <main class="flex-grow-1 auth-wrapper">
    <div class="card auth-card p-4 p-sm-5">
      
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 56px; height: 56px;">
          <i data-lucide="log-in" style="width: 26px; height: 26px;"></i>
        </div>
        <h2 class="fw-bold h3 text-dark mb-1">¡Bienvenido!</h2>
        <p class="text-secondary small">Ingresa tus credenciales para acceder a la plataforma.</p>
      </div>

      <form>
        <div class="mb-3">
          <label for="email" class="form-label fw-medium text-secondary small">Correo electrónico</label>
          <div class="input-group shadow-sm rounded-2 overflow-hidden">
            <span class="input-group-text bg-light border-end-0"><i data-lucide="mail" style="width: 18px;"></i></span>
            <input type="email" class="form-control bg-light" id="email" placeholder="correo@ejemplo.com" required>
          </div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between mb-1">
            <label for="password" class="form-label fw-medium text-secondary small mb-0">Contraseña</label>
<a href="recuperar-contrasena.html" class="text-decoration-none small text-primary fw-medium">¿La olvidaste?</a>
          </div>
          <div class="input-group shadow-sm rounded-2 overflow-hidden">
            <span class="input-group-text bg-light border-end-0"><i data-lucide="lock" style="width: 18px;"></i></span>
            <input type="password" class="form-control bg-light" id="password" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-auth-primary w-100 mb-3 d-flex align-items-center justify-content-center gap-2">
          <span>Ingresar</span>
          <i data-lucide="arrow-right" style="width: 18px;"></i>
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-secondary small mb-0">¿No tienes una cuenta cuenta? <a href="registro.html" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a></p>
      </div>

    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
