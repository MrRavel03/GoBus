<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - GoBus CR</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Estilos base -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    html { font-family: 'Inter', sans-serif; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">

  <!-- Botón Volver (Flotante arriba a la izquierda) -->
  <div class="absolute top-4 left-4 sm:top-8 sm:left-8">
    <a href="index.html" class="flex items-center text-sm font-medium text-slate-500 hover:text-blue-700 transition-colors">
      <i data-lucide="arrow-left" class="h-4 w-4 mr-1"></i>
      Volver al inicio
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Logo central -->
    <a href="index.html" class="flex justify-center items-center space-x-2 mb-6">
      <div class="bg-blue-700 p-2 rounded-xl shadow-sm">
        <i data-lucide="bus" class="h-8 w-8 text-white"></i>
      </div>
      <span class="font-extrabold text-3xl text-slate-900 tracking-tight">GoBus CR</span>
    </a>
    
    <h2 class="text-center text-2xl font-bold text-slate-900">
      Ingresa a tu cuenta
    </h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      O <a href="#" class="font-medium text-blue-600 hover:text-blue-500">regístrate si aún no tienes una</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl shadow-slate-200/50 sm:rounded-2xl border border-slate-100 sm:px-10">
      <form class="space-y-6" action="#" method="POST">
        
        <!-- Campo Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700">
            Correo electrónico
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="mail" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required 
              class="block w-full pl-10 px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm outline-none transition-colors" 
              placeholder="usuario@correo.com">
          </div>
        </div>

        <!-- Campo Contraseña -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700">
            Contraseña
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input id="password" name="password" type="password" autocomplete="current-password" required 
              class="block w-full pl-10 px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm outline-none transition-colors" 
              placeholder="••••••••">
          </div>
        </div>

        <!-- Opciones (Recordarme y Olvidé contraseña) -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" 
              class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded cursor-pointer">
            <label for="remember-me" class="ml-2 block text-sm text-slate-700 cursor-pointer">
              Recordarme
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-blue-600 hover:text-blue-500">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </div>

        <!-- Botón Submit -->
        <div>
          <button type="submit" 
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
            Iniciar sesión
          </button>
        </div>
      </form>

      <!-- Divisor Social Login -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-slate-500">O continuar con</span>
          </div>
        </div>

        <div class="mt-6">
          <button type="button" class="w-full flex justify-center py-2.5 px-4 border border-slate-300 rounded-lg shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Inicializar íconos de Lucide
    lucide.createIcons();
  </script>
</body>
</html>
