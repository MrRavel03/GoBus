<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - GoBus CR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-slate-50 position-relative py-5">

  <a href="index.html" class="back-btn d-flex align-items-center gap-1 fw-medium">
    <i data-lucide="arrow-left" style="width:16px;"></i> Volver al inicio
  </a>

  <div class="auth-container px-3">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none d-flex justify-content-center align-items-center gap-2 mb-4">
        <div class="bg-primary p-2 rounded-3 shadow-sm"><i data-lucide="bus" class="text-white" style="width:32px; height:32px;"></i></div>
        <span class="fw-bolder fs-2 text-dark">GoBus CR</span>
      </a>
      <h2 class="fw-bold text-dark">Ingresa a tu cuenta</h2>
      <p class="text-muted">O <a href="registro.html" class="text-decoration-none fw-medium">regístrate si aún no tienes una</a></p>
    </div>

    <div class="auth-card p-4 p-sm-5">
      <form action="perfil.html" method="GET">
        <div class="mb-3">
          <label class="form-label fw-medium text-dark small">Correo electrónico</label>
          <div class="input-icon-wrapper">
            <i data-lucide="mail" style="width:20px;"></i>
            <input type="email" class="form-control" placeholder="usuario@correo.com" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-medium text-dark small">Contraseña</label>
          <div class="input-icon-wrapper">
            <i data-lucide="lock" style="width:20px;"></i>
            <input type="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label small text-muted cursor-pointer" for="remember">Recordarme</label>
          </div>
          <a href="#" class="text-decoration-none small fw-medium">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">Iniciar sesión</button>
      </form>

      <div class="position-relative mt-4 mb-4 text-center">
        <hr class="text-muted">
        <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 small text-muted">O continuar con</span>
      </div>

      <button type="button" class="btn btn-light border w-100 py-2 fw-medium text-dark d-flex align-items-center justify-content-center gap-2">
        <svg style="width:20px; height:20px;" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
