<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Rutas - GoBus CR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<div id="header-container"></div>

  <main class="flex-grow-1 container-xl py-5">
    
    <div class="bg-white p-3 rounded-xl shadow-sm border mb-5">
      <form class="row g-2 align-items-center">
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i data-lucide="map-pin" class="text-muted" style="width: 20px;"></i></span>
            <input type="text" class="form-control border-start-0 py-2 bg-light" value="San José">
          </div>
        </div>
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i data-lucide="map" class="text-muted" style="width: 20px;"></i></span>
            <input type="text" class="form-control border-start-0 py-2 bg-light" value="Liberia">
          </div>
        </div>
        <div class="col-md-2">
          <button type="button" class="btn btn-warning text-white w-100 py-2 fw-bold d-flex justify-content-center gap-2" style="background-color: #f97316; border-color: #f97316;">
            <i data-lucide="search" style="width: 20px;"></i> Actualizar
          </button>
        </div>
      </form>
    </div>

    <div class="row g-4">
      <aside class="col-md-3">
        <div class="bg-white p-4 rounded-xl shadow-sm border">
          <h5 class="fw-bold text-dark mb-4 d-flex align-items-center gap-2">
            <i data-lucide="sliders-horizontal" class="text-primary" style="width:20px;"></i> Filtros
          </h5>
          <div class="mb-4">
            <h6 class="fw-semibold small text-secondary mb-3">Empresa</h6>
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" checked id="f1">
              <label class="form-check-label small text-secondary cursor-pointer" for="f1">Pulmitan de Liberia</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="f2">
              <label class="form-check-label small text-secondary cursor-pointer" for="f2">Tracopa</label>
            </div>
          </div>
          <div>
            <h6 class="fw-semibold small text-secondary mb-3">Comodidades</h6>
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="f3">
              <label class="form-check-label small text-secondary cursor-pointer" for="f3">Aire Acondicionado</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="f4">
              <label class="form-check-label small text-secondary cursor-pointer" for="f4">Rampa (Ley 7600)</label>
            </div>
          </div>
        </div>
      </aside>

      <div class="col-md-9">
        <h4 class="fw-bold text-dark mb-4 fs-5">3 rutas encontradas</h4>

        <a href="detalle-ruta.html" class="text-decoration-none">
          <div class="card rounded-xl border mb-3 shadow-sm card-route p-2">
            <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
              <div>
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="badge bg-success bg-opacity-10 text-success border border-success">Directo</span>
                  <span class="small text-secondary">Pulmitan de Liberia</span>
                </div>
                <h5 class="fw-bold text-dark mb-1 d-flex align-items-center gap-2">San José <i data-lucide="arrow-right" class="text-muted" style="width:16px;"></i> Liberia</h5>
                <div class="d-flex gap-3 small text-secondary mt-2">
                  <span class="d-flex align-items-center gap-1"><i data-lucide="clock" style="width:16px;"></i> 4h 00m</span>
                  <span class="d-flex align-items-center gap-1 text-primary"><i data-lucide="wind" style="width:16px;"></i> A/C</span>
                </div>
              </div>
              <div class="text-md-end d-flex flex-row flex-md-column justify-content-between align-items-center align-items-md-end">
                <div class="fs-4 fw-bold text-dark">₡4,150</div>
                <button class="btn btn-light text-primary border-0 mt-md-2 fw-medium small">Ver detalle</button>
              </div>
            </div>
          </div>
        </a>

        <a href="detalle-ruta.html" class="text-decoration-none">
          <div class="card rounded-xl border mb-3 shadow-sm card-route p-2">
            <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
              <div>
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="badge bg-warning bg-opacity-10 text-warning border border-warning">Regular</span>
                  <span class="small text-secondary">Pulmitan de Liberia</span>
                </div>
                <h5 class="fw-bold text-dark mb-1 d-flex align-items-center gap-2">San José <i data-lucide="arrow-right" class="text-muted" style="width:16px;"></i> Liberia</h5>
                <div class="d-flex gap-3 small text-secondary mt-2">
                  <span class="d-flex align-items-center gap-1"><i data-lucide="clock" style="width:16px;"></i> 5h 30m</span>
                  <span class="badge border text-secondary fw-normal">Hace paradas</span>
                </div>
              </div>
              <div class="text-md-end d-flex flex-row flex-md-column justify-content-between align-items-center align-items-md-end">
                <div class="fs-4 fw-bold text-dark">₡3,800</div>
                <button class="btn btn-light text-primary border-0 mt-md-2 fw-medium small">Ver detalle</button>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>
  </main>

<div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
