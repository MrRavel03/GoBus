<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Rutas - GoBus</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="d-flex flex-column min-vh-100 bg-slate-50">

  <!-- Header dinámico -->
  <div id="header-container"></div>

  <main class="flex-grow-1 container-xl py-4 py-md-5">
    <div class="row g-4">

      <!-- Panel de Filtros (Izquierda) -->
      <aside class="col-lg-3 d-none d-lg-block">
        <div class="bg-white p-4 rounded-xl border">
          <h5 class="fw-bold text-dark mb-4 d-flex align-items-center gap-2">
            <i data-lucide="filter" style="width:20px;"></i> Filtros
          </h5>

          <!-- Provincia -->
          <div class="mb-4">
            <h6 class="fw-bold small text-dark mb-3">Provincia</h6>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-sanjose">
              <label class="form-check-label text-secondary small" for="p-sanjose">San José</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-alajuela">
              <label class="form-check-label text-secondary small" for="p-alajuela">Alajuela</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-cartago">
              <label class="form-check-label text-secondary small" for="p-cartago">Cartago</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-heredia">
              <label class="form-check-label text-secondary small" for="p-heredia">Heredia</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-guanacaste">
              <label class="form-check-label text-secondary small" for="p-guanacaste">Guanacaste</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-puntarenas">
              <label class="form-check-label text-secondary small" for="p-puntarenas">Puntarenas</label>
            </div>
            <div class="form-check">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="p-limon">
              <label class="form-check-label text-secondary small" for="p-limon">Limón</label>
            </div>
          </div>

          <!-- Tipo de Servicio -->
          <div class="mb-4">
            <h6 class="fw-bold small text-dark mb-3">Tipo de Servicio</h6>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="ts-urbano">
              <label class="form-check-label text-secondary small" for="ts-urbano">Urbano</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked id="ts-interurbano">
              <label class="form-check-label text-secondary small" for="ts-interurbano">Interurbano</label>
            </div>
            <div class="form-check">
              <input class="form-check-input bg-secondary border-secondary" type="checkbox" checked
                id="ts-internacional">
              <label class="form-check-label text-secondary small" for="ts-internacional">Internacional</label>
            </div>
          </div>

          <button class="btn btn-light text-primary w-100 fw-medium" style="background-color: #eff6ff;">Limpiar
            filtros</button>
        </div>
      </aside>

      <!-- Contenido Principal (Derecha) -->
      <div class="col-lg-9">

        <!-- Buscador superior -->
        <div class="bg-white rounded-xl border mb-4 px-3 py-2 d-flex align-items-center">
          <i data-lucide="search" class="text-muted ms-2" style="width: 20px;"></i>
          <input type="text" class="form-control border-0 shadow-none bg-transparent"
            placeholder="Buscar por origen, destino o empresa...">
        </div>

        <!-- Tarjetas de Rutas -->
        <div class="d-flex flex-column gap-3 mb-4">

          <!-- Ruta 1 -->
          <a href="detalle-ruta.html" class="route-card p-4">
            <div class="row align-items-center">
              <div class="col-8 col-md-9">
                <div class="d-flex align-items-center gap-2 mb-3">
                  <span class="badge-soft-primary small">Urbano</span>
                  <span class="text-secondary small fw-medium">• Lumaca</span>
                </div>
                <div class="route-path">
                  <div class="route-dot start"></div>
                  <h6 class="fw-bold text-dark mb-3">San José</h6>
                  <div class="route-dot end"></div>
                  <h6 class="fw-bold text-dark mb-0">Cartago</h6>
                </div>
              </div>
              <div class="col-4 col-md-3 text-end d-flex flex-column align-items-end justify-content-between h-100">
                <span class="text-secondary small d-flex align-items-center gap-1 mb-2"><i data-lucide="clock"
                    style="width:14px;"></i> Cada 10 min</span>
                <span class="fs-4 fw-bolder text-dark mb-2">₡750</span>
                <div class="btn-round-arrow"><i data-lucide="chevron-right" style="width: 20px;"></i></div>
              </div>
            </div>
          </a>

          <!-- Ruta 2 (Destacada azul) -->
          <a href="detalle-ruta.html" class="route-card p-4">
            <div class="row align-items-center">
              <div class="col-8 col-md-9">
                <div class="d-flex align-items-center gap-2 mb-3">
                  <span class="badge-soft-primary small">Urbano</span>
                  <span class="text-secondary small fw-medium">• Rapiditos</span>
                </div>
                <div class="route-path">
                  <div class="route-dot start"></div>
                  <h6 class="fw-bold text-dark mb-3">San José</h6>
                  <div class="route-dot end"></div>
                  <h6 class="fw-bold text-dark mb-0">Heredia</h6>
                </div>
              </div>
              <div class="col-4 col-md-3 text-end d-flex flex-column align-items-end justify-content-between h-100">
                <span class="text-secondary small d-flex align-items-center gap-1 mb-2"><i data-lucide="clock"
                    style="width:14px;"></i> Cada 15 min</span>
                <span class="fs-4 fw-bolder text-dark mb-2">₡520</span>
                <div class="btn-round-arrow"><i data-lucide="chevron-right" style="width: 20px;"></i></div>
              </div>
            </div>
          </a>

          <!-- Ruta 3 -->
          <a href="detalle-ruta.html" class="route-card p-4">
            <div class="row align-items-center">
              <div class="col-8 col-md-9">
                <div class="d-flex align-items-center gap-2 mb-3">
                  <span class="badge-soft-primary small">Urbano</span>
                  <span class="text-secondary small fw-medium">• Tuasa</span>
                </div>
                <div class="route-path">
                  <div class="route-dot start"></div>
                  <h6 class="fw-bold text-dark mb-3">San José</h6>
                  <div class="route-dot end"></div>
                  <h6 class="fw-bold text-dark mb-0">Alajuela</h6>
                </div>
              </div>
              <div class="col-4 col-md-3 text-end d-flex flex-column align-items-end justify-content-between h-100">
                <span class="text-secondary small d-flex align-items-center gap-1 mb-2"><i data-lucide="clock"
                    style="width:14px;"></i> Cada 5 min</span>
                <span class="fs-4 fw-bolder text-dark mb-2">₡680</span>
                <div class="btn-round-arrow"><i data-lucide="chevron-right" style="width: 20px;"></i></div>
              </div>
            </div>
          </a>

          <!-- Ruta 4 -->
          <a href="detalle-ruta.html" class="route-card p-4">
            <div class="row align-items-center">
              <div class="col-8 col-md-9">
                <div class="d-flex align-items-center gap-2 mb-3">
                  <span class="badge-soft-primary small">Interurbano</span>
                  <span class="text-secondary small fw-medium">• Pulmitan</span>
                </div>
                <div class="route-path">
                  <div class="route-dot start"></div>
                  <h6 class="fw-bold text-dark mb-3">San José</h6>
                  <div class="route-dot end"></div>
                  <h6 class="fw-bold text-dark mb-0">Liberia</h6>
                </div>
              </div>
              <div class="col-4 col-md-3 text-end d-flex flex-column align-items-end justify-content-between h-100">
                <span class="text-secondary small d-flex align-items-center gap-1 mb-2"><i data-lucide="clock"
                    style="width:14px;"></i> Cada 2 horas</span>
                <span class="fs-4 fw-bolder text-dark mb-2">₡4,500</span>
                <div class="btn-round-arrow"><i data-lucide="chevron-right" style="width: 20px;"></i></div>
              </div>
            </div>
          </a>

        </div>

        <!-- Paginación -->
        <nav aria-label="Navegación de páginas">
          <ul class="pagination justify-content-center">
            <li class="page-item"><a class="page-link text-secondary border-0 bg-transparent" href="#">Ant</a></li>
            <li class="page-item active"><a class="page-link rounded bg-primary border-0" href="#">1</a></li>
            <li class="page-item"><a class="page-link text-secondary border-0 bg-transparent" href="#">2</a></li>
            <li class="page-item"><a class="page-link text-secondary border-0 bg-transparent" href="#">3</a></li>
            <li class="page-item"><a class="page-link text-secondary border-0 bg-transparent" href="#">Sig</a></li>
          </ul>
        </nav>

      </div>
    </div>
  </main>

  <!-- Footer dinámico -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
