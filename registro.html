<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - GoBus CR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    html { font-family: 'Inter', sans-serif; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">

  <!-- Botón Volver -->
  <div class="absolute top-4 left-4 sm:top-8 sm:left-8">
    <a href="index.html" class="flex items-center text-sm font-medium text-slate-500 hover:text-blue-700 transition-colors">
      <i data-lucide="arrow-left" class="h-4 w-4 mr-1"></i> Volver al inicio
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <a href="index.html" class="flex justify-center items-center space-x-2 mb-6">
      <div class="bg-blue-700 p-2 rounded-xl shadow-sm"><i data-lucide="bus" class="h-8 w-8 text-white"></i></div>
      <span class="font-extrabold text-3xl text-slate-900 tracking-tight">GoBus CR</span>
    </a>
    
    <h2 class="text-center text-2xl font-bold text-slate-900">Crea tu cuenta</h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      ¿Ya tienes una cuenta? <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500">Inicia sesión aquí</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl shadow-slate-200/50 sm:rounded-2xl border border-slate-100 sm:px-10">
      <form class="space-y-5" action="perfil.html" method="GET">
        
        <!-- Nombre Completo -->
        <div>
          <label for="name" class="block text-sm font-medium text-slate-700">Nombre completo</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="user" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input id="name" name="name" type="text" required 
              class="block w-full pl-10 px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm outline-none" placeholder="Juan Pérez">
          </div>
        </div>

        <!-- Correo Electrónico -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700">Correo electrónico</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="mail" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input id="email" name="email" type="email" required 
              class="block w-full pl-10 px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm outline-none" placeholder="juan@correo.com">
          </div>
        </div>

        <!-- Contraseña -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700">Contraseña</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input id="password" name="password" type="password" required 
              class="block w-full pl-10 px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm outline-none" placeholder="••••••••">
          </div>
          <p class="mt-1 text-xs text-slate-500">Debe tener al menos 8 caracteres.</p>
        </div>

        <!-- Términos -->
        <div class="flex items-start mt-4">
          <input id="terms" name="terms" type="checkbox" required class="mt-1 h-4 w-4 text-blue-600 border-slate-300 rounded">
          <label for="terms" class="ml-2 block text-sm text-slate-600">
            Acepto los <a href="#" class="text-blue-600 hover:underline">Términos de servicio</a> y la <a href="#" class="text-blue-600 hover:underline">Política de privacidad</a>.
          </label>
        </div>

        <div>
          <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mt-2">
            Crear cuenta
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
