<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - GoBus CR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-slate-50 position-relative py-5">

  <a href="index.html" class="back-btn d-flex align-items-center gap-1 fw-medium">
    <i data-lucide="arrow-left" style="width:16px;"></i> Volver al inicio
  </a>

  <div class="auth-container px-3">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none d-flex justify-content-center align-items-center gap-2 mb-4">
        <div class="bg-primary p-2 rounded-3 shadow-sm"><i data-lucide="bus" class="text-white" style="width:32px; height:32px;"></i></div>
        <span class="fw-bolder fs-2 text-dark">GoBus CR</span>
      </a>
      <h2 class="fw-bold text-dark">Crea tu cuenta</h2>
      <p class="text-muted">¿Ya tienes una cuenta? <a href="login.html" class="text-decoration-none fw-medium">Inicia sesión aquí</a></p>
    </div>

    <div class="auth-card p-4 p-sm-5">
      <form action="perfil.html" method="GET">
        
        <div class="mb-3">
          <label class="form-label fw-medium text-dark small">Nombre completo</label>
          <div class="input-icon-wrapper">
            <i data-lucide="user" style="width:20px;"></i>
            <input type="text" class="form-control" placeholder="Juan Pérez" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-medium text-dark small">Correo electrónico</label>
          <div class="input-icon-wrapper">
            <i data-lucide="mail" style="width:20px;"></i>
            <input type="email" class="form-control" placeholder="juan@correo.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-medium text-dark small">Contraseña</label>
          <div class="input-icon-wrapper">
            <i data-lucide="lock" style="width:20px;"></i>
            <input type="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-text small">Debe tener al menos 8 caracteres.</div>
        </div>

        <div class="form-check mb-4 mt-3">
          <input class="form-check-input" type="checkbox" id="terms" required>
          <label class="form-check-label small text-muted" for="terms">
            Acepto los <a href="#" class="text-decoration-none">Términos de servicio</a> y la <a href="#" class="text-decoration-none">Política de privacidad</a>.
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">Crear cuenta</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
