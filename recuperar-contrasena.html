<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - GoBus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <div id="header-container"></div>

  <main class="flex-grow-1 auth-wrapper">
    <div class="card auth-card p-4 p-sm-5 my-3">
      
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning rounded-circle mb-3" style="width: 56px; height: 56px;">
          <i data-lucide="key" style="width: 26px; height: 26px;"></i>
        </div>
        <h2 class="fw-bold h3 text-dark mb-2">Recuperar Contraseña</h2>
        <p class="text-secondary small">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
      </div>

      <form>
        <div class="mb-4">
          <label for="emailRecuperar" class="form-label fw-medium text-secondary small">Correo Electrónico</label>
          <div class="input-group shadow-sm rounded-2 overflow-hidden">
            <span class="input-group-text bg-light border-end-0"><i data-lucide="mail" style="width: 18px;"></i></span>
            <input type="email" class="form-control bg-light" id="emailRecuperar" placeholder="correo@ejemplo.com" required>
          </div>
        </div>

        <button type="submit" class="btn btn-auth-primary w-100 mb-4 d-flex align-items-center justify-content-center gap-2">
          <span>Enviar instrucciones</span>
          <i data-lucide="send" style="width: 16px;"></i>
        </button>
      </form>

      <div class="text-center border-top pt-3">
        <a href="login.html" class="text-secondary small text-decoration-none d-inline-flex align-items-center gap-1 hover-primary">
          <i data-lucide="arrow-left" style="width: 14px;"></i> Volver a iniciar sesión
        </a>
      </div>

    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
